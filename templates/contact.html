{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="text-center">Get in Touch</h2>
    <form class="mt-4">
        <div class="mb-3"><input type="text" class="form-control" placeholder="Your Name"></div>
        <div class="mb-3"><input type="email" class="form-control" placeholder="Email Address"></div>
        <div class="mb-3"><textarea class="form-control" rows="5" placeholder="Your Message"></textarea></div>
        <button type="submit" class="btn btn-dark w-100">Send Message</button>
    </form>
</div>
{% endblock %}
